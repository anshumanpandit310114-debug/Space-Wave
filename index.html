<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Space Wave Game</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: radial-gradient(circle at center, #091b2f 0%, #02060f 60%, #000 100%);
            color: #fff;
            font-family: Arial, sans-serif;
        }

        #game-container {
            position: relative;
            width: 100vw;
            height: 100vh;
        }

        canvas {
            display: block;
        }

        .ui {
            position: absolute;
            left: 20px;
            top: 20px;
            z-index: 10;
            background: rgba(0,0,0,0.5);
            padding: 12px 16px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.15);
            backdrop-filter: blur(6px);
        }

        .ui h1 {
            margin: 0 0 8px;
            font-size: 18px;
        }

        .ui p {
            margin: 4px 0;
            font-size: 14px;
            line-height: 1.4;
        }

        .tip {
            color: #7ecef4;
        }
    </style>
</head>
<body>
    <div id="game-container">
        <div class="ui">
            <h1>Space Wave</h1>
            <p>Hold left mouse button to fly up.</p>
            <p>Release to drift down at the same speed.</p>
            <p class="tip">Keep the ship between the waves!</p>
        </div>
        <canvas id="gameCanvas"></canvas>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        let width = window.innerWidth;
        let height = window.innerHeight;
        canvas.width = width;
        canvas.height = height;

        const ship = {
            x: width * 0.2,
            y: height / 2,
            radius: 18,
            velocity: 0,
            speed: 5,
            color: '#81d4fa'
        };

        const stars = Array.from({ length: 120 }, () => ({
            x: Math.random() * width,
            y: Math.random() * height,
            size: Math.random() * 2 + 1,
            speed: Math.random() * 0.7 + 0.5
        }));

        const waves = [];
        const waveCount = 6;
        for (let i = 0; i < waveCount; i++) {
            waves.push({ offset: i * 70, amplitude: 40 + i * 10, phase: Math.random() * Math.PI * 2, speed: 0.008 + i * 0.002 });
        }

        let mouseDown = false;
        
        function resize() {
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width;
            canvas.height = height;
            ship.x = width * 0.2;
            if (ship.y > height - 40) ship.y = height - 40;
        }

        window.addEventListener('resize', resize);

        canvas.addEventListener('mousedown', (e) => {
            if (e.button === 0) {
                mouseDown = true;
                ship.velocity = -ship.speed;
            }
        });

        window.addEventListener('mouseup', (e) => {
            if (e.button === 0) {
                mouseDown = false;
                ship.velocity = ship.speed;
            }
        });

        window.addEventListener('mouseleave', () => {
            mouseDown = false;
            ship.velocity = ship.speed;
        });

        window.addEventListener('touchstart', (e) => {
            e.preventDefault();
            mouseDown = true;
            ship.velocity = -ship.speed;
        }, { passive: false });

        window.addEventListener('touchend', (e) => {
            e.preventDefault();
            mouseDown = false;
            ship.velocity = ship.speed;
        });

        function drawBackground() {
            ctx.clearRect(0, 0, width, height);
            ctx.fillStyle = 'rgba(0, 8, 20, 0.72)';
            ctx.fillRect(0, 0, width, height);

            stars.forEach(star => {
                star.x -= star.speed;
                if (star.x < 0) star.x = width;
                ctx.fillStyle = 'rgba(255,255,255,' + (0.5 + Math.random() * 0.5) + ')';
                ctx.beginPath();
                ctx.arc(star.x, star.y, star.size, 0, Math.PI * 2);
                ctx.fill();
            });
        }

        function drawWaves(time) {
            waves.forEach((wave, index) => {
                ctx.strokeStyle = 'rgba(135,206,250,' + (0.16 + index * 0.05) + ')';
                ctx.lineWidth = 4;
                ctx.beginPath();
                for (let x = 0; x <= width; x += 14) {
                    const y = height * 0.7 + Math.sin((x * 0.012) + wave.phase + time * wave.speed) * wave.amplitude + index * 14;
                    if (x === 0) ctx.moveTo(x, y);
                    else ctx.lineTo(x, y);
                }
                ctx.stroke();
            });
        }

        function drawShip() {
            ctx.save();
            ctx.translate(ship.x, ship.y);
            ctx.rotate(ship.velocity * 0.08);

            ctx.fillStyle = ship.color;
            ctx.beginPath();
            ctx.moveTo(25, 0);
            ctx.lineTo(-18, -14);
            ctx.lineTo(-10, 0);
            ctx.lineTo(-18, 14);
            ctx.closePath();
            ctx.fill();

            ctx.fillStyle = 'rgba(255,255,255,0.9)';
            ctx.beginPath();
            ctx.arc(-4, 0, 5, 0, Math.PI * 2);
            ctx.fill();

            ctx.restore();
        }

        function update() {
            ship.y += ship.velocity;
            if (!mouseDown && ship.velocity !== ship.speed) {
                ship.velocity = ship.speed;
            }
            if (ship.y < 20) ship.y = 20;
            if (ship.y > height - 20) ship.y = height - 20;
        }

        function loop(time) {
            drawBackground();
            drawWaves(time * 0.001);
            update();
            drawShip();
            requestAnimationFrame(loop);
        }

        ship.velocity = ship.speed;
        requestAnimationFrame(loop);
    </script>
</body>
</html>
