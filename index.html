<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Space Waves</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { width: 100%; height: 100%; overflow: hidden; background: radial-gradient(circle at top, #08122b, #02060f 70%); font-family: Arial, sans-serif; }
        canvas { display: block; }
        #ui {
            position: absolute;
            top: 16px;
            left: 16px;
            color: #d9f4ff;
            font-size: 16px;
            text-shadow: 0 0 10px rgba(0,0,0,0.7);
            z-index: 10;
        }
        #ui span { display: block; margin-bottom: 8px; }
        #message {
            position: absolute;
            bottom: 16px;
            left: 50%;
            transform: translateX(-50%);
            color: #8be9fd;
            font-size: 18px;
            text-align: center;
            width: calc(100% - 40px);
            max-width: 600px;
            text-shadow: 0 0 10px rgba(0,0,0,0.8);
        }
    </style>
</head>
<body>
    <div id="ui">
        <span>Space Waves</span>
        <span>Hold left mouse button to go up</span>
        <span>Release to fall</span>
        <span id="score">Score: 0</span>
    </div>
    <div id="message">Click and hold left mouse button to fly!</div>
    <canvas id="game"></canvas>
    <script>
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');
        const msgEl = document.getElementById('message');
        let width = window.innerWidth;
        let height = window.innerHeight;
        canvas.width = width;
        canvas.height = height;

        const ship = {
            x: width * 0.15,
            y: height * 0.5,
            radius: 22,
            velocity: 0,
            lift: -0.42,
            gravity: 0.02,
            maxSpeed: 7,
        };

        let mouseDown = false;
        let obstacles = [];
        let frame = 0;
        let score = 0;
        let gameOver = false;

        const colors = {
            background: '#02060f',
            ship: '#76e1ff',
            trail: '#4bb8ff',
            obstacle: '#eb6f92',
            star: '#7df0ff',
        };

        function resize() {
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width;
            canvas.height = height;
            ship.x = width * 0.15;
            if (ship.y > height - ship.radius - 20) ship.y = height - ship.radius - 20;
        }

        window.addEventListener('resize', resize);

        window.addEventListener('mousedown', (event) => {
            if (event.button === 0) {
                mouseDown = true;
                msgEl.textContent = 'Keep holding to rise through the space waves!';
            }
        });

        window.addEventListener('mouseup', (event) => {
            if (event.button === 0) {
                mouseDown = false;
                msgEl.textContent = 'Release to descend. Avoid the walls!';
            }
        });

        window.addEventListener('touchstart', () => { mouseDown = true; msgEl.textContent = 'Touch and hold to rise!'; });
        window.addEventListener('touchend', () => { mouseDown = false; msgEl.textContent = 'Release to descend.'; });

        function createObstacle() {
            const gap = 180;
            const minHeight = 80;
            const maxHeight = height - gap - minHeight - 80;
            const topHeight = minHeight + Math.random() * maxHeight;
            obstacles.push({
                x: width + 80,
                topHeight,
                bottomY: topHeight + gap,
                width: 72,
                passed: false,
            });
        }

        function drawShip() {
            ctx.save();
            ctx.translate(ship.x, ship.y);
            ctx.fillStyle = colors.ship;
            ctx.beginPath();
            ctx.moveTo(-ship.radius, -ship.radius * 0.7);
            ctx.lineTo(ship.radius, 0);
            ctx.lineTo(-ship.radius, ship.radius * 0.7);
            ctx.closePath();
            ctx.fill();
            ctx.restore();
        }

        function drawStars() {
            for (let i = 0; i < 60; i++) {
                const x = (i * 73 + frame * 0.6) % width;
                const y = (i * 44 + (i % 3) * 20) % height;
                const alpha = 0.4 + 0.6 * ((i % 5) / 4);
                ctx.fillStyle = `rgba(123, 237, 255, ${alpha})`;
                ctx.beginPath();
                ctx.arc(x, y, 2, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function drawObstacles() {
            ctx.fillStyle = colors.obstacle;
            obstacles.forEach(obs => {
                ctx.fillRect(obs.x, 0, obs.width, obs.topHeight);
                ctx.fillRect(obs.x, obs.bottomY, obs.width, height - obs.bottomY);
                ctx.fillStyle = '#ffb3c6';
                ctx.fillRect(obs.x + 8, obs.topHeight - 16, obs.width - 16, 12);
                ctx.fillRect(obs.x + 8, obs.bottomY + 4, obs.width - 16, 12);
                ctx.fillStyle = colors.obstacle;
            });
        }

        function updateShip() {
            if (mouseDown) {
                ship.velocity += ship.lift;
            } else {
                ship.velocity += ship.gravity;
            }
            ship.velocity = Math.max(-ship.maxSpeed, Math.min(ship.velocity, ship.maxSpeed));
            ship.y += ship.velocity * 2;
            if (ship.y < ship.radius + 10) ship.y = ship.radius + 10;
            if (ship.y > height - ship.radius - 10) ship.y = height - ship.radius - 10;
        }

        function updateObstacles() {
            obstacles.forEach(obs => {
                obs.x -= 4;
                if (!obs.passed && obs.x + obs.width < ship.x) {
                    obs.passed = true;
                    score += 1;
                    scoreEl.textContent = `Score: ${score}`;
                }
            });
            obstacles = obstacles.filter(obs => obs.x + obs.width > -50);
            if (frame % 110 === 0) createObstacle();
        }

        function detectCollision() {
            for (const obs of obstacles) {
                if (ship.x + ship.radius > obs.x && ship.x - ship.radius < obs.x + obs.width) {
                    if (ship.y - ship.radius < obs.topHeight || ship.y + ship.radius > obs.bottomY) {
                        return true;
                    }
                }
            }
            return false;
        }

        function drawWave() {
            ctx.strokeStyle = '#7de2ff';
            ctx.lineWidth = 3;
            ctx.beginPath();
            for (let x = 0; x <= width; x += 15) {
                const y = height * 0.5 + Math.sin((x * 0.02) + frame * 0.03) * 40;
                if (x === 0) ctx.moveTo(x, y);
                else ctx.lineTo(x, y);
            }
            ctx.stroke();
        }

        function gameLoop() {
            ctx.fillStyle = colors.background;
            ctx.fillRect(0, 0, width, height);
            drawStars();
            drawWave();
            updateShip();
            updateObstacles();
            drawObstacles();
            drawShip();
            frame += 1;

            if (detectCollision()) {
                gameOver = true;
                msgEl.textContent = 'Game Over! Refresh to play again.';
            }
            if (!gameOver) requestAnimationFrame(gameLoop);
        }

        gameLoop();
    </script>
</body>
</html>
